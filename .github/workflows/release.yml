name: Build desktop releases

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS arm64
            os: macos-latest
            npm_script: dist:mac
            artifact: yuki-macos
            paths: |
              desktop/release/*.dmg
              desktop/release/*.zip
          - name: Linux x64
            os: ubuntu-latest
            npm_script: dist:linux:tar
            artifact: yuki-linux
            paths: |
              desktop/release/*.tar.gz
          - name: Windows x64
            os: windows-latest
            npm_script: dist:win
            artifact: yuki-windows
            paths: |
              desktop/release/*.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Linux native dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libasound2-dev \
            libglib2.0-0 \
            libgl1 \
            libi2c-dev \
            libreadline-dev \
            libsm6 \
            libxext6 \
            libxrender1 \
            portaudio19-dev \
            libportaudio2
          sudo apt-get install -y libfuse2t64 || sudo apt-get install -y libfuse2

      - name: Install macOS native dependencies
        if: runner.os == 'macOS'
        run: brew install readline

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Build package
        working-directory: desktop
        run: npm run ${{ matrix.npm_script }} -- --publish never

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.paths }}
          if-no-files-found: warn

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Attach artifacts to release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          find release-artifacts -type f \( -name '*.dmg' -o -name '*.zip' -o -name '*.tar.gz' -o -name '*.exe' \) -print > release-files.txt
          if [ ! -s release-files.txt ]; then
            echo "::error::No desktop release assets were downloaded."
            exit 1
          fi

          for attempt in 1 2 3; do
            gh release view "$TAG_NAME" >/dev/null 2>&1 || gh release create "$TAG_NAME" --title "$TAG_NAME" --generate-notes
            failed=0
            while IFS= read -r file; do
              gh release upload "$TAG_NAME" "$file" --clobber || failed=1
            done < release-files.txt
            if [ "$failed" -eq 0 ]; then
              exit 0
            fi
            sleep $((attempt * 15))
          done

          exit 1
