name: Build desktop releases

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS arm64
            os: macos-latest
            npm_script: dist:mac
            artifact: yuki-macos
            paths: |
              desktop/release/*.dmg
              desktop/release/*.zip
              desktop/release/mac-*/YukiShell.app
          - name: Linux x64
            os: ubuntu-latest
            npm_script: dist:linux
            artifact: yuki-linux
            paths: |
              desktop/release/*.AppImage
              desktop/release/*.deb
          - name: Windows x64
            os: windows-latest
            npm_script: dist:win
            artifact: yuki-windows
            paths: |
              desktop/release/*.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Linux native dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential libreadline-dev libi2c-dev portaudio19-dev libportaudio2

      - name: Install macOS native dependencies
        if: runner.os == 'macOS'
        run: brew install readline

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Build package
        working-directory: desktop
        run: npm run ${{ matrix.npm_script }} -- --publish never

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.paths }}
          if-no-files-found: warn

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Attach artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/**
          generate_release_notes: true
